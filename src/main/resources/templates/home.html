<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head"></head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
<nav th:replace="fragments/layout :: navbar"></nav>

<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <!-- Create Post Section -->
        <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-8 mb-8 hover:shadow-3xl transition-all duration-500 hover:bg-white/15">
            <div class="flex items-center space-x-4 mb-6">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-white">Create a Post</h3>
            </div>

            <form method="post" th:action="@{/posts}" th:object="${postDto}">
                <div class="mb-6">
          <textarea th:field="*{content}" rows="4" placeholder="What's on your mind?"
                    class="w-full px-4 py-4 bg-white/10 border border-white/30 rounded-xl text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent backdrop-blur-md resize-none hover:bg-white/20 transition-all duration-300 shadow-lg"></textarea>
                    <div th:if="${#fields.hasErrors('content')}" class="text-red-300 text-sm mt-2 flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        <span th:errors="*{content}"></span>
                    </div>
                </div>
                <button type="submit" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-8 py-3 rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 hover:from-purple-600 hover:to-pink-600 flex items-center space-x-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    <span>Share Post</span>
                </button>
            </form>
        </div>

        <!-- Posts Feed -->
        <div class="space-y-6">
            <div th:each="post : ${posts}" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-6 hover:shadow-3xl transition-all duration-500 hover:bg-white/15 group">

                <!-- Post Header -->
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg group-hover:shadow-xl transition-all duration-300">
                        <span th:text="${post.authorName.substring(0,1)}"></span>
                    </div>
                    <div class="ml-4 flex-1">
                        <p class="font-semibold text-white text-lg" th:text="${post.authorName}"></p>
                        <p class="text-white/60 text-sm flex items-center space-x-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
                            </svg>
                            <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                        </p>
                    </div>
                </div>

                <!-- Post Content -->
                <div class="bg-white/5 rounded-xl p-4 mb-4 border border-white/10">
                    <p class="text-white leading-relaxed" th:text="${post.content}"></p>
                </div>

                <!-- Post Actions -->
                <div class="flex items-center justify-between pt-4 border-t border-white/20">
                    <button th:id="'like-btn-' + ${post.id}"
                            th:onclick="'toggleLike(' + ${post.id} + ')'"
                            th:class="${post.likedByCurrentUser ? 'text-red-400 bg-red-500/20' : 'text-white/70 bg-white/10'} + ' hover:bg-red-500/30 flex items-center space-x-2 px-4 py-2 rounded-full transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-xl backdrop-blur-md border border-white/20'">
                        <span th:id="'like-icon-' + ${post.id}" class="text-lg" th:text="${post.likedByCurrentUser ? '❤️' : '🤍'}"></span>
                        <span th:id="'like-count-' + ${post.id}" class="font-medium" th:text="${post.likeCount}"></span>
                        <span class="text-sm">Likes</span>
                    </button>

                    <div class="flex items-center space-x-4">
                        <button class="text-white/70 hover:text-white flex items-center space-x-2 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 transition-all duration-300 hover:scale-105 shadow-lg backdrop-blur-md border border-white/20">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                            </svg>
                            <span class="text-sm">Comment</span>
                        </button>

                        <button class="text-white/70 hover:text-white flex items-center space-x-2 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 transition-all duration-300 hover:scale-105 shadow-lg backdrop-blur-md border border-white/20">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z"/>
                            </svg>
                            <span class="text-sm">Share</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleLike(postId) {
        $.post('/api/posts/' + postId + '/like', function(data) {
            $('#like-count-' + postId).text(data.likeCount);
            $('#like-icon-' + postId).text(data.liked ? '❤️' : '🤍');

            const likeBtn = $('#like-btn-' + postId);
            if (data.liked) {
                likeBtn.removeClass('text-white/70 bg-white/10').addClass('text-red-400 bg-red-500/20');
            } else {
                likeBtn.removeClass('text-red-400 bg-red-500/20').addClass('text-white/70 bg-white/10');
            }
        });
    }

    // Add enhanced animations and interactions
    document.addEventListener('DOMContentLoaded', function() {
        // Stagger animation for posts
        const posts = document.querySelectorAll('.space-y-6 > div');
        posts.forEach((post, index) => {
            post.style.animationDelay = `${index * 0.1}s`;
            post.style.animation = 'fadeInUp 0.6s ease-out forwards';
        });

        // Add floating animation to post creation section
        const createPostSection = document.querySelector('.max-w-2xl > div:first-child');
        createPostSection.style.animation = 'float 3s ease-in-out infinite';

        // Enhanced hover effects for interactive elements
        const interactiveElements = document.querySelectorAll('button, textarea, input');
        interactiveElements.forEach(element => {
            element.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });

            element.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    });

    // Add CSS keyframes for animations
    const style = document.createElement('style');
    style.textContent = `
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
  `;
    document.head.appendChild(style);
</script>
</body>
</html>
