<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head"></head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">

<div class="min-h-screen flex items-center justify-center p-4">
  <div class="relative">
    <!-- Floating background elements -->
    <div class="absolute -top-4 -left-4 w-72 h-72 bg-purple-500/20 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute -bottom-4 -right-4 w-72 h-72 bg-blue-500/20 rounded-full blur-3xl animate-pulse delay-1000"></div>
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-green-500/10 rounded-full blur-3xl animate-pulse delay-2000"></div>

    <!-- Main register container -->
    <div class="relative backdrop-blur-2xl bg-white/10 border border-white/20 p-8 rounded-2xl shadow-2xl w-96 hover:shadow-3xl transition-all duration-500">
      <!-- Logo section -->
      <div class="flex justify-center mb-8">
        <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md border border-white/30 shadow-xl animate-float">
          <svg class="w-8 h-8 text-white drop-shadow-md" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
      </div>

      <h2 class="text-3xl font-bold text-center mb-8 text-white bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
        Join Our Community
      </h2>

      <!-- Error message -->
      <div th:if="${error}" class="bg-red-500/20 border border-red-400/30 text-red-200 px-4 py-3 rounded-lg mb-6 backdrop-blur-md animate-pulse">
        <div class="flex items-center">
          <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          <span th:text="${error}"></span>
        </div>
      </div>

      <!-- Register form -->
      <form method="post" th:action="@{/register}" th:object="${userDto}" class="space-y-6">

        <!-- First Name -->
        <div class="group">
          <label for="firstName" class="block text-sm font-medium text-white/90 mb-2">First Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-white/50 group-focus-within:text-blue-400 transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <input type="text" id="firstName" th:field="*{firstName}"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 backdrop-blur-md transition-all duration-300 hover:bg-white/20"
                   placeholder="Enter your first name">
          </div>
          <div th:if="${#fields.hasErrors('firstName')}" class="text-red-300 text-sm mt-2 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span th:errors="*{firstName}"></span>
          </div>
        </div>

        <!-- Last Name -->
        <div class="group">
          <label for="lastName" class="block text-sm font-medium text-white/90 mb-2">Last Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-white/50 group-focus-within:text-blue-400 transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <input type="text" id="lastName" th:field="*{lastName}"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 backdrop-blur-md transition-all duration-300 hover:bg-white/20"
                   placeholder="Enter your last name">
          </div>
          <div th:if="${#fields.hasErrors('lastName')}" class="text-red-300 text-sm mt-2 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span th:errors="*{lastName}"></span>
          </div>
        </div>

        <!-- Email -->
        <div class="group">
          <label for="email" class="block text-sm font-medium text-white/90 mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-white/50 group-focus-within:text-blue-400 transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
            </div>
            <input type="email" id="email" th:field="*{email}"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 backdrop-blur-md transition-all duration-300 hover:bg-white/20"
                   placeholder="Enter your email address">
          </div>
          <div th:if="${#fields.hasErrors('email')}" class="text-red-300 text-sm mt-2 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span th:errors="*{email}"></span>
          </div>
        </div>

        <!-- Password -->
        <div class="group">
          <label for="password" class="block text-sm font-medium text-white/90 mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-white/50 group-focus-within:text-blue-400 transition-colors" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
            </div>
            <input type="password" id="password" th:field="*{password}"
                   class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 backdrop-blur-md transition-all duration-300 hover:bg-white/20"
                   placeholder="Create a secure password">
          </div>
          <div th:if="${#fields.hasErrors('password')}" class="text-red-300 text-sm mt-2 flex items-center">
            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span th:errors="*{password}"></span>
          </div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white py-3 px-6 rounded-lg font-semibold shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-purple-500/50">
          <span class="flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
            Create Account
          </span>
        </button>
      </form>

      <!-- Login link -->
      <div class="mt-8 text-center">
        <p class="text-white/70 text-sm mb-2">Already have an account?</p>
        <a th:href="@{/static}" class="inline-flex items-center text-blue-400 hover:text-blue-300 font-medium transition-colors duration-300 hover:underline">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
          </svg>
          Sign In Instead
        </a>
      </div>

      <!-- Decorative elements -->
      <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
        <div class="absolute top-4 right-4 w-2 h-2 bg-blue-400 rounded-full animate-ping"></div>
        <div class="absolute bottom-4 left-4 w-2 h-2 bg-purple-400 rounded-full animate-ping delay-1000"></div>
        <div class="absolute top-1/2 left-2 w-1 h-1 bg-green-400 rounded-full animate-ping delay-2000"></div>
      </div>
    </div>
  </div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * {
    font-family: 'Inter', sans-serif;
  }

  .animate-float {
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .shadow-3xl {
    box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
  }

  /* Custom input focus glow */
  input:focus {
    box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
  }

  /* Custom button hover effect */
  button:hover {
    box-shadow: 0 10px 25px rgba(147, 51, 234, 0.3);
  }

  /* Smooth backdrop blur animation */
  .backdrop-blur-2xl {
    backdrop-filter: blur(40px);
  }

  /* Enhanced error message styling */
  .text-red-300 {
    text-shadow: 0 0 10px rgba(252, 165, 165, 0.3);
  }
</style>

</body>
</html>
