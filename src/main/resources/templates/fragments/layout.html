<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'gradient': 'gradient 15s ease infinite',
            'float': 'float 3s ease-in-out infinite',
            'pulse-soft': 'pulse-soft 2s infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            gradient: {
              '0%, 100%': { 'background-position': '0% 50%' },
              '50%': { 'background-position': '100% 50%' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            'pulse-soft': {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' }
            },
            glow: {
              '0%': { 'box-shadow': '0 0 5px rgba(59, 130, 246, 0.5)' },
              '100%': { 'box-shadow': '0 0 20px rgba(59, 130, 246, 0.8)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    .gradient-bg {
      background: linear-gradient(135deg,
      rgba(139, 92, 246, 0.95) 0%,
      rgba(59, 130, 246, 0.95) 25%,
      rgba(16, 185, 129, 0.95) 50%,
      rgba(245, 101, 101, 0.95) 75%,
      rgba(251, 146, 60, 0.95) 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }

    .notification-dot {
      animation: pulse-soft 2s infinite;
    }

    .nav-item {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-item:hover {
      transform: translateY(-2px) scale(1.05);
    }

    .search-glow:focus {
      animation: glow 2s ease-in-out infinite alternate;
    }

    .logo-text {
      background: linear-gradient(45deg, #fff, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    .mobile-menu {
      transform: translateX(100%);
      transition: transform 0.3s ease-in-out;
    }

    .mobile-menu.active {
      transform: translateX(0);
    }

    .user-badge {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logout-btn {
      background: linear-gradient(45deg, #ef4444, #dc2626);
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: linear-gradient(45deg, #dc2626, #b91c1c);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">

<nav th:fragment="navbar" class=" shadow-2xl sticky top-0 z-50 backdrop-blur-sm border-b border-white/10">
  <div class="absolute -top-4 -left-4 w-72 h-72 bg-purple-500/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="container mx-auto px-4 py-4">
    <div class="flex justify-between items-center">

      <!-- Logo Section -->
      <div class="flex items-center space-x-4 animate-float">
        <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-md border border-white/30 shadow-xl hover:bg-white/30 transition-all duration-300 hover:scale-110">
          <svg class="w-6 h-6 text-white drop-shadow-md" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold logo-text tracking-wide">Social Media</h1>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">

        <!-- Search Bar -->
        <div class="relative group">
          <input type="text" placeholder="Search..." class="bg-white/10 border border-white/30 rounded-full px-4 py-2 pl-10 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50 search-glow backdrop-blur-md w-64 hover:bg-white/20 transition-all duration-300">
          <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-white/70 group-hover:text-white transition-colors" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
          </svg>
        </div>

        <!-- Navigation Links -->
        <a th:href="@{/home}" class="nav-item text-white hover:text-blue-200 px-6 py-3 rounded-xl backdrop-blur-md bg-white/10 border border-white/20 hover:bg-white/20 shadow-lg hover:shadow-xl transition-all duration-300 font-medium">
          <svg class="w-4 h-4 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
          Home
        </a>

        <a th:href="@{/friends}" class="nav-item text-white hover:text-blue-200 px-6 py-3 rounded-xl backdrop-blur-md bg-white/10 border border-white/20 hover:bg-white/20 shadow-lg hover:shadow-xl transition-all duration-300 font-medium relative">
          <svg class="w-4 h-4 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Friends
          <span class="absolute -top-2 -right-2 w-3 h-3 bg-red-500 rounded-full notification-dot shadow-lg"></span>
        </a>

        <!-- User Profile -->
        <div class="user-badge px-4 py-2 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 hover:scale-105">
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center shadow-lg hover:shadow-xl transition-all duration-300">
              <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-white font-medium" th:text="${currentUser?.fullName}">User Name</span>
          </div>
        </div>

        <!-- Logout Button -->
        <form method="post" th:action="@{/logout}" class="inline">
          <button type="submit" class="logout-btn px-6 py-3 rounded-full text-white font-medium shadow-lg hover:shadow-xl transition-all duration-300">
            <svg class="w-4 h-4 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
            </svg>
            Logout
          </button>
        </form>

      </div>

      <!-- Mobile Menu Toggle -->
      <div class="md:hidden">
        <button class="menu-toggle text-white p-2 rounded-lg backdrop-blur-md bg-white/10 border border-white/20 hover:bg-white/20 transition-all duration-300" onclick="toggleMobileMenu()">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="mobile-menu fixed top-0 right-0 h-full w-80 bg-gradient-to-br from-purple-600/95 to-blue-600/95 z-50 md:hidden backdrop-blur-md border-l border-white/20 shadow-2xl">
    <div class="p-6">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-bold text-white">Menu</h2>
        <button class="text-white hover:text-gray-200 p-2 rounded-lg hover:bg-white/10 transition-all duration-300" onclick="toggleMobileMenu()">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="space-y-4">
        <a th:href="@{/home}" class="block nav-item backdrop-blur-md bg-white/10 border border-white/20 p-4 rounded-lg text-white hover:bg-white/20 transition-all duration-300 shadow-lg hover:shadow-xl">
          <svg class="w-5 h-5 inline mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
          Home
        </a>

        <a th:href="@{/friends}" class="block nav-item backdrop-blur-md bg-white/10 border border-white/20 p-4 rounded-lg text-white hover:bg-white/20 transition-all duration-300 shadow-lg hover:shadow-xl">
          <svg class="w-5 h-5 inline mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Friends
        </a>

        <div class="user-badge p-4 rounded-lg mt-6 shadow-lg">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center shadow-lg">
              <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
            </div>
            <span class="text-white font-medium" th:text="${currentUser?.fullName}">User Name</span>
          </div>
        </div>

        <form method="post" th:action="@{/logout}" class="mt-6">
          <button type="submit" class="logout-btn w-full px-6 py-3 rounded-lg text-white font-medium shadow-lg hover:shadow-xl transition-all duration-300">
            <svg class="w-5 h-5 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
            </svg>
            Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div id="menuOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden md:hidden transition-opacity duration-300" onclick="toggleMobileMenu()"></div>

</nav>

<script>
  function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('menuOverlay');

    menu.classList.toggle('active');
    overlay.classList.toggle('hidden');
  }

  // Close mobile menu when clicking outside
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobileMenu');
    const toggle = document.querySelector('.menu-toggle');

    if (!menu.contains(e.target) && !toggle.contains(e.target)) {
      menu.classList.remove('active');
      document.getElementById('menuOverlay').classList.add('hidden');
    }
  });

  // Add smooth scrolling and enhanced interactions
  document.addEventListener('DOMContentLoaded', function() {
    // Add stagger animation to nav items
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach((item, index) => {
      item.style.animationDelay = '${index * 0.1}s';
    });

    // Enhanced hover effects
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      link.addEventListener('mouseenter', function() {
        this.style.transform = 'translateY(-2px) scale(1.05)';
      });

      link.addEventListener('mouseleave', function() {
        this.style.transform = 'translateY(0) scale(1)';
      });
    });

    // Add parallax effect to background
    window.addEventListener('scroll', function() {
      const scrolled = window.pageYOffset;
      const rate = scrolled * -0.5;
      document.body.style.transform = 'translateY(${rate}px)';
    });
  });
</script>

</body>
</html>
